name: 🚀 Stadium AI CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  NODE_VERSION: '18.x'

jobs:
  # ── Security & Dependency Checks ──────────────────────────────────────────
  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔍 Run security audit
      run: npm audit --audit-level high
      
    - name: 🛡️ Check for vulnerabilities
      run: |
        # Run npm audit and capture output
        if npm audit --audit-level moderate --json > audit.json; then
          echo "✅ No moderate or higher vulnerabilities found"
        else
          echo "⚠️ Vulnerabilities detected:"
          cat audit.json | jq '.vulnerabilities'
          exit 1
        fi

  # ── Code Quality & Linting ────────────────────────────────────────────────
  lint:
    name: 📋 Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🎨 Check code formatting
      run: |
        echo "🎨 Running Prettier check..."
        npx prettier --check "src/**/*.{ts,tsx}" "server/**/*.{ts,tsx}"
        
    - name: 🔍 Run ESLint
      run: |
        echo "🔍 Running ESLint..."
        npx eslint src/ server/ --ext .ts,.tsx --max-warnings 0

  # ── Testing Suite ─────────────────────────────────────────────────────────
  test:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        test-suite: [unit, integration, e2e]
        
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🧪 Run ${{ matrix.test-suite }} tests
      run: |
        case "${{ matrix.test-suite }}" in
          "unit")
            echo "🧪 Running unit tests..."
            npm test -- --testPathPattern="components|server" --coverage --coverageReporters=json
            ;;
          "integration")
            echo "🔗 Running integration tests..."
            npm test -- --testPathPattern="integration" --verbose
            ;;
          "e2e")
            echo "🎭 Running E2E tests..."
            npm test -- --testPathPattern="e2e" --verbose
            ;;
        esac
        
    - name: 📊 Upload coverage reports
      if: matrix.test-suite == 'unit'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage/coverage-final.json
        flags: unittests
        name: codecov-umbrella

  # ── Build Verification ────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Verification
    runs-on: ubuntu-latest
    needs: [security, lint]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🏗️ Build client
      run: |
        echo "🏗️ Building frontend..."
        npm run build:client
        
    - name: 🏗️ Build server
      run: |
        echo "🏗️ Building backend..."
        npm run build:server
        
    - name: 📊 Check bundle sizes
      run: |
        echo "📊 Analyzing bundle sizes..."
        du -sh dist/* | sort -hr
        
        # Check if bundle is reasonable size (under 2MB)
        BUNDLE_SIZE=$(du -s dist | cut -f1)
        if [ $BUNDLE_SIZE -gt 2048 ]; then
          echo "⚠️ Bundle size too large: ${BUNDLE_SIZE}KB"
          exit 1
        else
          echo "✅ Bundle size acceptable: ${BUNDLE_SIZE}KB"
        fi

  # ── Performance Testing ───────────────────────────────────────────────────
  performance:
    name: ⚡ Performance Tests
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🏗️ Build application
      run: npm run build
      
    - name: 🚀 Start server in background
      run: |
        npm start &
        sleep 10  # Wait for server to start
        
    - name: ⚡ Run performance tests
      run: |
        echo "⚡ Testing API performance..."
        
        # Test API response times
        response_time=$(curl -w "%{time_total}" -s -o /dev/null http://localhost:3001/api/health)
        
        if (( $(echo "$response_time > 1.0" | bc -l) )); then
          echo "⚠️ API response too slow: ${response_time}s"
          exit 1
        else
          echo "✅ API response time acceptable: ${response_time}s"
        fi
        
        # Test multiple concurrent requests
        echo "🔄 Testing concurrent requests..."
        for i in {1..10}; do
          curl -s http://localhost:3001/api/health > /dev/null &
        done
        wait

  # ── Security Scanning ─────────────────────────────────────────────────────
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🛡️ Run security tests
      run: |
        echo "🛡️ Running security-specific tests..."
        npm test -- --testPathPattern="security" --verbose
        
    - name: 🔍 Check for hardcoded secrets
      run: |
        echo "🔍 Scanning for hardcoded secrets..."
        
        # Check for potential secrets in code
        if grep -r -E "(api_key|password|secret|token)" --include="*.ts" --include="*.tsx" src/ server/ --exclude-dir=node_modules | grep -v "PLACEHOLDER\|EXAMPLE\|TEST"; then
          echo "⚠️ Potential secrets found in code!"
          exit 1
        else
          echo "✅ No hardcoded secrets detected"
        fi

  # ── Deployment Preparation (on main branch) ───────────────────────────────
  deploy-check:
    name: 🚀 Deployment Check
    runs-on: ubuntu-latest
    needs: [test, build, performance, security-scan]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 📦 Install dependencies
      run: npm ci
      
    - name: 🏗️ Build for production
      run: |
        export NODE_ENV=production
        npm run build
        
    - name: ✅ Deployment readiness check
      run: |
        echo "✅ All checks passed! Ready for deployment."
        echo "📊 Test results summary:"
        echo "  - Security: ✅ Passed"
        echo "  - Code Quality: ✅ Passed"
        echo "  - Tests: ✅ Passed"
        echo "  - Build: ✅ Passed"
        echo "  - Performance: ✅ Passed"
        
        # Create deployment artifact
        tar -czf stadium-ai-build.tar.gz dist/ dist-server/ package.json package-lock.json
        
    - name: 📦 Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: stadium-ai-production-build
        path: stadium-ai-build.tar.gz
        retention-days: 30

  # ── Notification ──────────────────────────────────────────────────────────
  notify:
    name: 📢 Notify Results
    runs-on: ubuntu-latest
    needs: [deploy-check]
    if: always()
    
    steps:
    - name: 📢 Build Status Notification
      run: |
        if [ "${{ needs.deploy-check.result }}" == "success" ]; then
          echo "🎉 Stadium AI CI/CD Pipeline completed successfully!"
          echo "✅ All tests passed and application is ready for deployment"
        else
          echo "❌ Stadium AI CI/CD Pipeline failed"
          echo "🔍 Check the logs for details"
        fi